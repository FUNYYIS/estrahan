name: Apply chat and icon fix

on:
  push:
    branches:
      - fix/chat-composer-icon-restore
    paths:
      - scripts/restore-original-icons-and-wire-chat.py
      - .github/workflows/apply-chat-icon-fix.yml

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: fix/chat-composer-icon-restore
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install image dependency
        run: python -m pip install pillow

      - name: Restore original icon and wire chat fix
        run: python scripts/restore-original-icons-and-wire-chat.py

      - name: Remove temporary automation
        run: rm -f scripts/restore-original-icons-and-wire-chat.py .github/workflows/apply-chat-icon-fix.yml

      - name: Install Functions dependencies
        run: npm ci --prefix functions

      - name: Validate project
        run: npm run validate

      - name: Commit generated changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: restore original app icon and expose chat composer"
          git push origin HEAD:fix/chat-composer-icon-restore
