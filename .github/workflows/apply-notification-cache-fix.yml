name: Apply notification cache follow-up

on:
  push:
    branches:
      - fix/notification-reliability
    paths:
      - .github/workflows/apply-notification-cache-fix.yml

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: fix/notification-reliability
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Apply prayer cache follow-up
        run: node scripts/apply-notification-cache-fix.js

      - name: Install Functions dependencies
        run: npm ci --prefix functions

      - name: Validate project
        run: npm run validate

      - name: Commit generated changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add functions/index.js
          git commit -m "fix: cache prayer timings and recover stale claims"
          git push origin HEAD:fix/notification-reliability
