name: Apply notification upgrade

on:
  push:
    branches:
      - fix/notification-reliability
    paths:
      - scripts/apply-notification-upgrade.js
      - .github/workflows/apply-notification-upgrade.yml

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: fix/notification-reliability
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Apply notification, timing, and icon fixes
        run: node scripts/apply-notification-upgrade.js

      - name: Install Functions dependencies
        run: npm ci --prefix functions

      - name: Validate project
        run: npm run validate

      - name: Commit generated changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: deduplicate notifications and align local timing"
          git push origin HEAD:fix/notification-reliability
