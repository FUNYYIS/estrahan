<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق الاستراحة</title>
    <meta name="description" content="تطبيق الاستراحة لإدارة وتنظيم الأمور المالية والإدارية بين أعضاء الاستراحة الشبابية، بما في ذلك جمع الاشتراكات، متابعة المدفوعات، الدردشة، ومواعيد المباريات.">
    <meta name="robots" content="index, follow">

    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://unpkg.com https://www.gstatic.com https://apis.google.com https://www.google.com https://www.recaptcha.net https://challenges.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; connect-src 'self' https://unpkg.com https://fonts.googleapis.com https://fonts.gstatic.com https://www.gstatic.com https://*.googleapis.com https://*.firebaseio.com wss://*.firebaseio.com https://identitytoolkit.googleapis.com https://securetoken.googleapis.com https://www.googleapis.com https://api.aladhan.com https://api-football-v1.p.rapidapi.com https://api.allorigins.win https://newsapi.org; img-src 'self' data: https://*.googleusercontent.com https://i.imgur.com https://media.api-sports.io https://media.api-sports.io; media-src 'self' blob:; frame-src 'self' https://www.google.com https://www.recaptcha.net https://*.firebaseapp.com https://challenges.cloudflare.com; child-src 'self' https://www.recaptcha.net; form-action 'self';">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="assets/images/favicon.png" type="image/png">
    <link rel="apple-touch-icon" href="assets/images/logo.png">
    <meta name="theme-color" content="#c76b29">

    <link rel="stylesheet" href="assets/css/main.css">
    
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js" defer></script>
    
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap"></noscript>
</head>

<body>
    <div id="splash">
        <video autoplay muted loop playsinline src="welcome.mp4"></video>
    </div>

    <div id="main-content">
        <img id="app-logo" loading="lazy" src="assets/images/logo.png" alt="شعار الاستراحة" class="logo">
        <div id="page-content"></div>

        <nav id="bottom-nav" class="bottom-bar" style="display: none;">
            <ul>
                <li><a href="#home" class="nav-link"><i data-lucide="home"></i><span>الرئيسية</span></a></li>
                <li><a href="#members" class="nav-link"><i data-lucide="users"></i><span>الأعضاء</span></a></li>
                <li><a href="#payments" class="nav-link"><i data-lucide="credit-card"></i><span>ادفع</span></a></li>
                <li><a href="#chat" class="nav-link"><i data-lucide="message-square"></i><span>الدردشة</span></a></li>
                <li><a href="#settings" class="nav-link"><i data-lucide="settings"></i><span>الإعدادات</span></a></li>
            </ul>
        </nav>
    </div>

    <div id="custom-alert" class="custom-alert">
        <div class="alert-content">
            <p id="alert-message"></p>
            <div class="alert-buttons">
                <button id="alert-close-btn">حسنًا</button>
            </div>
        </div>
    </div>

    <script type="module" src="assets/js/main.js"></script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('service-worker.js')
                    .then(registration => {
                        console.log('ServiceWorker registration successful with scope: ', registration.scope);
                    })
                    .catch(err => {
                        console.log('ServiceWorker registration failed: ', err);
                    });
            });
        }
    </script>
</body>
</html>
