    <link rel="icon" href="assets/images/shagrdiyah-mark.svg?v=61" type="image/svg+xml">
    <link rel="apple-touch-icon" href="assets/images/shagrdiyah-mark.svg?v=61">
    <link rel="preload" href="assets/images/riyadh-skyline-bg.jpg" as="image" fetchpriority="high">
    <meta name="theme-color" content="#1F5A46">

    <link rel="stylesheet" href="assets/css/main.css?v=61">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js" defer></script>
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap"></noscript>
</head>

<body>
    <div id="splash" class="splash" aria-hidden="true">
        <div class="splash-card">
            <img src="assets/images/shagrdiyah-mark.svg?v=61" alt="" loading="eager" decoding="async">
            <strong>الشقردية</strong>
            <span>يالله حيّه في جمعة الشقردية</span>
        </div>
    </div>

    <div id="main-content" class="app-shell">
        <aside class="sidebar">
            <a class="brand" href="#home" aria-label="الشقردية">
                <img id="app-logo" src="assets/images/shagrdiyah-mark.svg?v=61" alt="الشقردية" class="logo" loading="eager" decoding="async">
                <span>
                    <strong>الشقردية</strong>
                    <small>يالله حيّه</small>
                </span>
            </a>

            <nav id="bottom-nav" class="nav" aria-label="Primary navigation" style="display: none;">
                <a href="#home" class="nav-link"><i data-lucide="home"></i><span>الرئيسية</span></a>
                <a href="#payments" class="nav-link"><i data-lucide="wallet-cards"></i><span>القطة</span></a>
                <a href="#chat" class="nav-link"><i data-lucide="messages-square"></i><span>السوالف</span></a>
                <a href="#matches" class="nav-link"><i data-lucide="trophy"></i><span>المباريات</span></a>
                <a href="#news" class="nav-link"><i data-lucide="newspaper"></i><span>الأخبار</span></a>
                <a href="#members" class="nav-link"><i data-lucide="users"></i><span>الأعضاء</span></a>
                <a href="#prayer" class="nav-link"><i data-lucide="landmark"></i><span>الصلاة</span></a>
                <a href="#settings" class="nav-link"><i data-lucide="settings"></i><span>الإعدادات</span></a>
            </nav>

            <button id="logout-button" class="sidebar-logout" type="button">
                <i data-lucide="log-out"></i>
                <span>تسجيل خروج</span>
            </button>
        </aside>

        <main class="main">
            <header class="topbar">
                <button id="menuBtn" class="icon-btn mobile-only" type="button" aria-label="Open menu"><i data-lucide="menu"></i></button>
                <div class="top-profile">
                    <button id="notifyBtn" class="notify-bell" type="button" aria-label="Enable notifications">
                        <i data-lucide="bell"></i>
                        <span>3</span>
                    </button>
                    <div class="profile-avatar">
                        <img id="shell-avatar" src="assets/images/shagrdiyah-mark.svg?v=61" alt="" loading="lazy" decoding="async">
                    </div>
                    <div class="profile-copy">
                        <strong></strong>
                        <small></small>
                    </div>
                    <i data-lucide="chevron-down"></i>
                </div>
                <div class="top-actions">
                    <p id="todayLabel" class="eyebrow"></p>
                    <h1 id="pageTitle">الشقردية</h1>
                    <span id="onlineState" class="status-pill"></span>
                </div>
            </header>

            <section id="page-content" class="view" aria-live="polite"></section>
        </main>
    </div>

    <div id="custom-alert" class="custom-alert">
        <div class="alert-content">
            <p id="alert-message"></p>
            <div class="alert-buttons">
                <button id="alert-close-btn">حسنًا</button>
            </div>
        </div>
    </div>

    <script type="module" src="assets/js/main.js"></script>
</body>
</html>
