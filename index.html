    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="assets/icons/icon-192.png" type="image/png">
    <link rel="apple-touch-icon" href="assets/icons/icon-192.png">

    <link rel="preload" href="assets/images/estraha-logo.svg" as="image" fetchpriority="high">
    <link rel="preload" href="assets/images/riyadh-skyline-bg.jpg" as="image" fetchpriority="high">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="الاستراحة">
    <meta name="theme-color" content="#07130f">

    <link rel="stylesheet" href="assets/css/main.css?v=250">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js" defer></script>
</head>

<body>
    <div id="splash" class="splash" aria-hidden="true">
        <div class="splash-card">
            <img class="splash-logo" src="assets/images/estraha-logo.svg" alt="تطبيق الاستراحة" loading="eager" decoding="async" fetchpriority="high">
            <strong>تطبيق الاستراحة</strong>
            <span>إدارة خدمات الاستراحة والقطة والمباريات</span>
        </div>
    </div>

    <div id="main-content" class="app-shell">
        <aside class="sidebar">
            <a class="brand" href="#home" aria-label="تطبيق الاستراحة">
                <img id="app-logo" src="assets/images/estraha-logo.svg?v=227" alt="تطبيق الاستراحة" class="logo" loading="eager" decoding="async" fetchpriority="high">
                <span>
                    <strong>تطبيق الاستراحة</strong>
                    <small>إدارة الاستراحة</small>
                </span>
            </a>

            <nav id="bottom-nav" class="nav" aria-label="التنقل الرئيسي" style="display: none;">
                <a href="#home" class="nav-link"><i data-lucide="home"></i><span>الرئيسية</span></a>
                <a href="#chat" class="nav-link"><i data-lucide="messages-square"></i><span>الدردشة</span></a>
                <a href="#matches" class="nav-link"><i data-lucide="trophy"></i><span>المباريات</span></a>
                <a href="#payments" class="nav-link"><i data-lucide="paw-print"></i><span>القطة</span></a>
                <a href="#news" class="nav-link"><i data-lucide="newspaper"></i><span>الأخبار</span></a>
                <a href="#members" class="nav-link"><i data-lucide="users"></i><span>الأعضاء</span></a>
                <a href="#prayer" class="nav-link"><i data-lucide="landmark"></i><span>الصلاة</span></a>
                <a href="#settings" class="nav-link"><i data-lucide="grid-2x2"></i><span>المزيد</span></a>
            </nav>

            <button id="logout-button" class="sidebar-logout" type="button">
                <i data-lucide="log-out"></i>
                <span>تسجيل خروج</span>
            </button>
        </aside>

        <main class="main">
            <header class="topbar">
                <button id="menuBtn" class="icon-btn mobile-only" type="button" aria-label="فتح القائمة">
                    <i data-lucide="menu"></i>
                </button>

                <div class="top-profile" id="top-profile" role="button" tabindex="0" aria-label="بياناتك">
                    <div class="profile-avatar">
                        <img id="shell-avatar" src="assets/images/estraha-logo.svg?v=227" alt="" loading="lazy" decoding="async">
                    </div>

                    <div class="profile-copy">
                        <strong></strong>
                        <small></small>
                    </div>

                    <button id="notifyBtn" class="notify-bell" type="button" aria-label="تفعيل التنبيهات">
                        <i data-lucide="bell"></i>
                        <span class="notification-count hidden" aria-hidden="true"></span>
                    </button>

                    <i data-lucide="chevron-down"></i>
                </div>

                <div class="top-actions">
                    <img class="topbar-logo" src="assets/images/estraha-logo.svg" alt="تطبيق الاستراحة" loading="lazy" decoding="async">
                    <div class="topbar-title-copy">
                        <p id="todayLabel" class="eyebrow"></p>
                        <h1 id="pageTitle">تطبيق الاستراحة</h1>
                    </div>
                    <span id="onlineState" class="status-pill"></span>
                </div>
            </header>

            <section id="page-content" class="view" aria-live="polite"></section>
        </main>
    </div>

    <div id="custom-alert" class="custom-alert">
        <div class="alert-content">
            <p id="alert-message"></p>
            <div class="alert-buttons">
                <button id="alert-close-btn">حسنًا</button>
            </div>
        </div>
    </div>

    <script type="module" src="assets/js/main.js?v=250"></script>
</body>
</html>
