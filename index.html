<body>
    <script>
        (function () {
            try {
                var t = localStorage.getItem('al-istiraha-theme') || 'light';
                var theme = t === 'dark' ? 'dark' : 'light';
                document.body.setAttribute('data-theme', theme);
                var m = document.querySelector('meta[name="theme-color"]');
                if (m) m.setAttribute('content', theme === 'dark' ? '#101413' : '#78915a');
            } catch (e) {
                document.body.setAttribute('data-theme', 'light');
            }
        })();
    </script>
    <div id="splash" class="splash" aria-hidden="true">
        <div class="splash-card">
            <img class="splash-logo" src="assets/icons/icon-512-original-zoom.png?v=283" alt="تطبيق الاستراحة" width="245" height="245" loading="eager" decoding="async" fetchpriority="high">
            <strong>تطبيق الاستراحة</strong>
            <span>إدارة خدمات الاستراحة والقطة والمباريات</span>
        </div>
    </div>

    <div id="main-content" class="app-shell">
        <aside class="sidebar">
            <a class="brand" href="#home" aria-label="تطبيق الاستراحة">
                <img id="app-logo" src="assets/icons/icon-192-original-zoom.png?v=283" alt="تطبيق الاستراحة" class="logo" width="82" height="82" loading="eager" decoding="async">
                <span>
                    <strong>تطبيق الاستراحة</strong>
                    <small>إدارة الاستراحة</small>
                </span>
            </a>

            <button id="logout-button" class="sidebar-logout hidden" type="button">
                <i data-lucide="log-out"></i>
                <span>تسجيل خروج</span>
            </button>
        </aside>

        <main class="main">
            <header class="topbar">
                <button id="menuBtn" class="icon-btn mobile-only" type="button" aria-label="فتح القائمة">
                    <i data-lucide="menu"></i>
                </button>

                <div class="top-profile" id="top-profile" role="button" tabindex="0" aria-label="بياناتك">
                    <div class="profile-avatar">
                        <img id="shell-avatar" src="assets/icons/icon-192-original-zoom.png?v=283" alt="" width="58" height="58" loading="eager" decoding="async">
                    </div>

                    <div class="profile-copy">
                        <strong></strong>
                        <small></small>
                    </div>

                    <button id="notifyBtn" class="notify-bell" type="button" aria-label="تفعيل التنبيهات">
                        <i data-lucide="bell"></i>
                        <span class="notification-count hidden" aria-hidden="true"></span>
                    </button>

                    <i data-lucide="chevron-down"></i>
                </div>

                <div class="top-actions">
                    <img class="topbar-logo" src="assets/icons/icon-192-original-zoom.png?v=283" alt="تطبيق الاستراحة" width="48" height="48" loading="eager" decoding="async">
                    <div class="topbar-title-copy">
                        <p id="todayLabel" class="eyebrow"></p>
                        <h1 id="pageTitle">تطبيق الاستراحة</h1>
                    </div>
                    <span id="onlineState" class="status-pill"></span>
                </div>
            </header>

            <section id="page-content" class="view" aria-live="polite"></section>
        </main>
    </div>

    <nav id="bottom-nav" class="nav hidden" aria-label="التنقل الرئيسي">
        <a href="#home" class="nav-link"><i data-lucide="home"></i><span>الرئيسية</span></a>
