# إعادة توجيه أساسية لضمان عمل التطبيق كصفحة واحدة (SPA)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# إعدادات الهيدرات لزيادة الأمان والأداء
[[headers]]
  # تطبيق هذه الهيدرات على جميع صفحات الموقع
  for = "/*"
  [headers.values]
    # (HSTS) إجبار المتصفح على استخدام اتصال آمن (HTTPS) دائماً
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    
    # (XFO) منع الموقع من العرض داخل إطار (iframe) للحماية من هجمات Clickjacking
    X-Frame-Options = "DENY"
    
    # (CSP) سياسة أمان المحتوى لتحديد المصادر الموثوقة فقط
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://unpkg.com https://www.gstatic.com https://apis.google.com https://www.googleapis.com https://www.google.com https://recaptcha.google.com https://www.recaptcha.net https://recaptcha__en.www.gstatic.com https://recaptcha__ar.www.gstatic.com https://challenges.cloudflare.com https://challenges-test.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://www.gstatic.com https://www.google.com https://recaptcha.google.com https://www.recaptcha.net; font-src 'self' https://fonts.gstatic.com data:; connect-src 'self' https://unpkg.com https://fonts.googleapis.com https://fonts.gstatic.com https://www.gstatic.com https://www.google.com https://recaptcha.google.com https://www.recaptcha.net https://identitytoolkit.googleapis.com https://securetoken.googleapis.com https://www.googleapis.com https://recaptcha.net https://*.googleapis.com https://*.firebaseio.com wss://*.firebaseio.com https://api.aladhan.com https://v3.football.api-sports.io https://api-football-v1.p.rapidapi.com https://api.allorigins.win https://newsapi.org; img-src 'self' data: https://*.googleusercontent.com https://i.imgur.com https://media.api-sports.io https://www.gstatic.com https://www.google.com https://recaptcha.google.com https://www.recaptcha.net; media-src 'self' blob:; frame-src 'self' https://www.google.com https://recaptcha.google.com https://www.recaptcha.net https://recaptcha.net https://recaptcha__en.www.gstatic.com https://recaptcha__ar.www.gstatic.com https://*.firebaseapp.com https://challenges.cloudflare.com https://challenges-test.cloudflare.com; child-src 'self' https://www.google.com https://recaptcha.google.com https://www.recaptcha.net https://recaptcha.net; form-action 'self' https://www.google.com https://recaptcha.google.com https://www.recaptcha.net; worker-src 'self';"

# إعدادات التخزين المؤقت (Caching) للملفات
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
