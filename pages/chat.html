<section class="chat-page clean-chat-page compact-chat-page">
    <header class="app-page-header chat-page-header">
        <div>
            <img src="assets/images/estraha-logo.svg" alt="تطبيق الاستراحة" class="app-page-logo" loading="lazy" decoding="async">
            <div>
                <span>سوالف الاستراحة</span>
                <h2>الدردشة</h2>
            </div>
        </div>
        <i data-lucide="messages-square"></i>
    </header>

    <div id="chat-box" class="messages">
        <p class="text-center">جاري تحميل الدردشة...</p>
    </div>

    <form id="chat-form">
        <input type="text" id="chat-input" placeholder="اكتب رسالتك..." autocomplete="off" required>
        <button type="submit" class="btn" aria-label="إرسال"><i data-lucide="send"></i></button>
    </form>
</section>
