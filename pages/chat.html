<section class="chat-page">

        <h2><i data-lucide="message-square"></i> شات المطانيخ</h2>
        <span class="badge live">مباشر</span>
    </div>
    <div id="chat-box" class="messages">
        <p class="text-center">جاري تحميل السوالف...</p>

    </form>
</section>
