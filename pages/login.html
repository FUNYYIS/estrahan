<div class="auth-layout">
    <div class="auth-brand">
        <h2>Al Istiraha</h2>
        <p>منصة خاصة وآمنة لمطانيخ الاستراحة، تجمع القطة، السوالف، الخدمات اليومية، المباريات، الأخبار، ومواقيت الصلاة في مكان واحد.</p>
        <div class="majlis-art" role="img" aria-label="Premium Gulf majlis inspired illustration"></div>
    </div>

    <div class="content-body">
        <h2>أقلط</h2>
        <form id="phone-form">
            <div class="input-group">
                <label for="phone-number">رقم الجوال</label>
                <input type="tel" id="phone-number" placeholder="05XXXXXXXX" autocomplete="tel" required>
            </div>
            <button type="submit" class="btn">أرسل الرمز</button>
            <p id="login-status" class="auth-status muted" aria-live="polite"></p>
            <div id="recaptcha-container" class="mt-4"></div>
        </form>
        <form id="code-form" style="display: none;">
            <div class="input-group">
                <label for="verification-code">رمز الدخول</label>
                <input type="text" id="verification-code" inputmode="numeric" autocomplete="one-time-code" required>
            </div>
            <button type="submit" class="btn">تحقق واقلط</button>
            <p id="login-code-status" class="auth-status muted" aria-live="polite"></p>
        </form>
        <p class="link-text">ما عندك حساب؟ <a href="#register">سجل معنا يا ذيب</a></p>
    </div>
</div>
