<section class="panel">
    <div class="panel-head">
        <h2><i data-lucide="bell"></i> إعدادات التنبيهات</h2>
        <a href="#settings" class="service-link">الإعدادات</a>
    </div>
    <div class="section-stack">
        <div class="list-item-card">
            <span class="font-bold">تذكير الدفع الشهري</span>
            <button class="notification-toggle" type="button" data-notification-toggle="payment-notification" aria-pressed="true" aria-label="تفعيل تذكير الدفع الشهري">
                <i data-lucide="toggle-right"></i>
            </button>
        </div>
        <div class="list-item-card">
            <span class="font-bold">تنبيهات مواقيت الصلاة</span>
            <button class="notification-toggle" type="button" data-notification-toggle="prayer-notification" aria-pressed="true" aria-label="تفعيل تنبيهات مواقيت الصلاة">
                <i data-lucide="toggle-right"></i>
            </button>
        </div>
        <div class="list-item-card">
            <span class="font-bold">تنبيهات نتائج المباريات</span>
            <button class="notification-toggle" type="button" data-notification-toggle="matches-notification" aria-pressed="false" aria-label="تفعيل تنبيهات نتائج المباريات">
                <i data-lucide="toggle-left"></i>
            </button>
        </div>
        <div class="list-item-card">
            <span class="font-bold">تنبيهات الرسائل الجديدة</span>
            <button class="notification-toggle" type="button" data-notification-toggle="chat-notification" aria-pressed="true" aria-label="تفعيل تنبيهات الرسائل الجديدة">
                <i data-lucide="toggle-right"></i>
            </button>
        </div>
    </div>
</section>
