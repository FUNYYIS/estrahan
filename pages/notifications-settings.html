<header class="app-page-header">
    <div>
        <img src="assets/images/estraha-logo.svg" alt="تطبيق الاستراحة" class="app-page-logo" loading="lazy" decoding="async">
        <div>
            <span>تفضيلات التنبيه</span>
            <h2>الإشعارات</h2>
        </div>
    </div>
    <a href="#settings" class="service-link">المزيد</a>
</header>

<section class="panel">
    <div class="panel-head">
        <h2><i data-lucide="bell"></i> تنبيهاتك</h2>
        <a href="#settings" class="service-link">الضبط</a>
    </div>
    <div class="list-item-card">
        <div>
            <span class="font-bold">حالة إذن المتصفح</span>
            <p id="notification-permission-status" class="text-sm">جاري التحقق...</p>
            <p id="notification-sync-status" class="text-sm"></p>
        </div>
    </div>
    <div class="section-stack">
        <div class="list-item-card">
            <span class="font-bold">تنبيه القطه</span>
            <button class="notification-toggle" type="button" data-notification-toggle="payment-notification" aria-pressed="true" aria-label="تفعيل تنبيه القطه">
                <i data-lucide="toggle-right"></i>
                <span>شغّال</span>
            </button>
        </div>
        <div class="list-item-card">
            <span class="font-bold">نبّهني وقت الصلاة</span>
            <button class="notification-toggle" type="button" data-notification-toggle="prayer-notification" aria-pressed="false" aria-label="تفعيل تنبيهات مواقيت الصلاة">
                <i data-lucide="toggle-left"></i>
                <span>مقفّل</span>
            </button>
        </div>
        <div class="list-item-card">
            <span class="font-bold">علمني بالمباريات</span>
            <button class="notification-toggle" type="button" data-notification-toggle="matches-notification" aria-pressed="false" aria-label="تفعيل تنبيهات نتائج المباريات">
                <i data-lucide="toggle-left"></i>
                <span>مقفّل</span>
            </button>
        </div>
        <div class="list-item-card">
            <span class="font-bold">ارسل لي اذا فيه علم جديد</span>
            <button class="notification-toggle" type="button" data-notification-toggle="chat-notification" aria-pressed="true" aria-label="تفعيل تنبيهات الدردشة الجديدة">
                <i data-lucide="toggle-right"></i>
                <span>شغّال</span>
            </button>
        </div>
    </div>
    <div class="list-item-card mt-4">
        <div>
            <span class="font-bold">موقع تنبيه الصلاة</span>
            <p id="prayer-location-status" class="text-sm">جاري التحقق...</p>
        </div>
        <button id="save-prayer-location" class="btn btn-fit" type="button">استخدام موقعي</button>
    </div>
    <div class="cards-grid mt-4">
        <button id="register-notification-device" class="btn" type="button">تسجيل هذا الجهاز للإشعارات</button>
        <button id="resync-notifications" class="btn" type="button">إعادة مزامنة الإشعارات</button>
    </div>
</section>
