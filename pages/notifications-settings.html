<section class="panel">
    <div class="panel-head">
        <h2><i data-lucide="bell"></i> تنبيهاتك</h2>
        <a href="#settings" class="service-link">الضبط</a>
    </div>
    <div class="section-stack">
        <div class="list-item-card">
            <span class="font-bold">لا تنسى القطة يا ذيبان</span>
            <button class="notification-toggle" type="button" data-notification-toggle="payment-notification" aria-pressed="true" aria-label="تفعيل لا تنسى القطة يا ذيبان">
                <i data-lucide="toggle-right"></i>
                <span>شغّال</span>
            </button>
        </div>
        <div class="list-item-card">
            <span class="font-bold">نبّهني وقت الصلاة</span>
            <button class="notification-toggle" type="button" data-notification-toggle="prayer-notification" aria-pressed="true" aria-label="تفعيل تنبيهات مواقيت الصلاة">
                <i data-lucide="toggle-right"></i>
                <span>شغّال</span>
            </button>
        </div>
        <div class="list-item-card">
            <span class="font-bold">علمني بالمباريات</span>
            <button class="notification-toggle" type="button" data-notification-toggle="matches-notification" aria-pressed="false" aria-label="تفعيل تنبيهات نتائج المباريات">
                <i data-lucide="toggle-left"></i>
                <span>مقفّل</span>
            </button>
        </div>
        <div class="list-item-card">
            <span class="font-bold">علمني إذا جا كلام جديد</span>
            <button class="notification-toggle" type="button" data-notification-toggle="chat-notification" aria-pressed="true" aria-label="تفعيل تنبيهات السوالف الجديدة">
                <i data-lucide="toggle-right"></i>
                <span>شغّال</span>
            </button>
        </div>
    </div>
</section>
