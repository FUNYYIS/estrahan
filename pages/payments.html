<section class="panel payment-panel">
    <div class="panel-head">
        <h2><i data-lucide="credit-card"></i> دفع القطة</h2>
        <span class="badge scheduled">يوم 27</span>
    </div>
    <div class="payment-card">
        <div class="payment-bank">
            <span>البنك</span>
            <strong>بنك الراجحي</strong>
        </div>
        <div class="payment-iban">
            <span>رقم الآيبان</span>
            <strong id="iban">SA00 ... 7890</strong>
        </div>
        <button id="copy-iban-button" class="btn payment-copy" type="button">انسخ الآيبان</button>
    </div>
    <div class="payment-methods">
        <div class="payment-method">
            <span class="payment-method-name">Apple Pay</span>
            <button class="payment-button apple-pay-button" type="button" disabled aria-disabled="true">
                <span class="apple-mark" aria-hidden="true">Apple Pay</span>
                <span class="payment-soon">قريبا</span>
            </button>
        </div>
        <div class="payment-method">
            <span class="payment-method-name">STC Pay</span>
            <button class="payment-button stc-pay-button" type="button" disabled aria-disabled="true">
                <span class="stc-pay-mark" aria-hidden="true">stc pay</span>
                <span class="payment-soon">قريبا</span>
            </button>
        </div>
        <div class="payment-method">
            <span class="payment-method-name">الدفع بالبطاقة</span>
            <button class="payment-button card-pay-button" type="button" disabled aria-disabled="true">
                <span class="card-pay-mark" aria-hidden="true"><span></span></span>
                <span class="payment-soon">قريبا</span>
            </button>
        </div>
    </div>
</section>

<section class="panel">
    <div class="panel-head">
        <h2><i data-lucide="receipt"></i> سجل القطة</h2>
    </div>
    <div id="payment-log-list" class="section-stack">
        <p class="text-center">جاري تحميل السجل...</p>
    </div>
</section>
