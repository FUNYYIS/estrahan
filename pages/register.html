<div class="auth-layout">
    <div class="auth-brand">
        <img class="auth-logo" src="assets/images/estraha-logo.svg" alt="تطبيق الاستراحة" loading="eager" decoding="async">
        <span>إدارة خدمات الاستراحة</span>
        <h2>تطبيق الاستراحة</h2>
        <p>إدارة خدمات الاستراحة والقطة والمباريات</p>
    </div>

    <div class="content-body">
        <img class="auth-form-logo" src="assets/images/estraha-logo.svg" alt="تطبيق الاستراحة" loading="lazy" decoding="async">

        <form id="register-form">
            <div class="input-group">
                <label for="register-name">اسمك يا طويل العمر</label>
                <input type="text" id="register-name" autocomplete="name" required>
            </div>
            <div class="input-group">
                <label for="register-phone-number">رقم جوالك</label>
                <input type="tel" id="register-phone-number" placeholder="05XXXXXXXX" autocomplete="tel" required>
            </div>
            <button type="submit" class="btn">أرسل رمز التسجيل</button>
            <p id="register-status" class="auth-status muted" aria-live="polite"></p>
            <div id="recaptcha-container-register" class="mt-4"></div>
        </form>
        <form id="register-code-form" style="display: none;">
            <div class="input-group">
                <label for="register-verification-code">رمز الدخول</label>
                <input type="text" id="register-verification-code" inputmode="numeric" autocomplete="one-time-code" required>
            </div>
            <button type="submit" class="btn">تحقق واقلط</button>
            <p id="register-code-status" class="auth-status muted" aria-live="polite"></p>
        </form>
        <p class="link-text">عندك حساب؟ <a href="#login">أقلط</a></p>
    </div>
</div>
