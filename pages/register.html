<div class="auth-layout">
    <div class="auth-brand">
        <img class="auth-logo" src="assets/images/al-istiraha-icon.svg" alt="Al Istiraha" loading="eager" decoding="async">
        <span>مرحباً بك في</span>
        <h2>الاستراحة</h2>
        <p>بيت يجمعنا على المودة والمحبة</p>
        <img class="auth-hero-image" src="assets/images/riyadh-header.webp" alt="" loading="eager" decoding="async" fetchpriority="high">
    </div>

    <div class="content-body">
        <img class="auth-form-logo" src="assets/images/al-istiraha-icon.svg" alt="Al Istiraha" loading="lazy" decoding="async">
        <h2>سجل معنا</h2>
        <form id="register-form">
            <div class="input-group">
                <label for="register-name">اسمك يا طويل العمر</label>
                <input type="text" id="register-name" autocomplete="name" required>
            </div>
            <div class="input-group">
                <label for="register-phone-number">رقم الجوال</label>
                <input type="tel" id="register-phone-number" placeholder="05XXXXXXXX" autocomplete="tel" required>
            </div>
            <button type="submit" class="btn">أرسل الرمز</button>
            <p id="register-status" class="auth-status muted" aria-live="polite"></p>
            <div id="recaptcha-container-register" class="mt-4"></div>
        </form>
        <form id="register-code-form" style="display: none;">
            <div class="input-group">
                <label for="register-verification-code">رمز الدخول</label>
                <input type="text" id="register-verification-code" inputmode="numeric" autocomplete="one-time-code" required>
            </div>
            <button type="submit" class="btn">تحقق واقلط</button>
            <p id="register-code-status" class="auth-status muted" aria-live="polite"></p>
        </form>
        <p class="link-text">عندك حساب؟ <a href="#login">اقلط منا</a></p>
    </div>
</div>
